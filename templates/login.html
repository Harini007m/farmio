{% extends 'base.html' %}
{% block title %}Login - FarmIO{% endblock %}

{% block content %}
<div class="container py-5 mt-lg-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card border-0 animate-fade">
                <div class="text-center mb-5">
                    <div class="brand-icon mx-auto mb-3" style="width: 60px; height: 60px; font-size: 1.75rem;">F</div>
                    <h2 class="fw-bold text-dark">Welcome Back</h2>
                    <p class="text-muted small">Access your farm-to-table dashboard</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                    <div class="mb-4">
                        <label for="email"
                            class="form-label text-uppercase small fw-bold text-muted letter-spacing-1">Email
                            Identifier</label>
                        <div class="input-group input-group-lg border-bottom-0">
                            <span class="input-group-text bg-light border-0"><svg width="18" height="18"
                                    fill="var(--s-400)" viewBox="0 0 24 24">
                                    <path
                                        d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                                </svg></span>
                            <input type="email" class="form-control bg-light border-0 shadow-none ps-0" id="email"
                                name="email" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="mb-5">
                        <div class="d-flex justify-content-between">
                            <label for="password"
                                class="form-label text-uppercase small fw-bold text-muted letter-spacing-1">Security
                                Key</label>
                            <a href="#" class="x-small text-primary fw-bold text-decoration-none">Forgot?</a>
                        </div>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-0"><svg width="18" height="18"
                                    fill="var(--s-400)" viewBox="0 0 24 24">
                                    <path
                                        d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                                </svg></span>
                            <input type="password" class="form-control bg-light border-0 shadow-none ps-0" id="password"
                                name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit"
                        class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold mb-4 shadow-premium">Sign In to
                        Platform</button>

                    <div class="text-center">
                        <p class="mb-0 small text-muted">New to the platform? <a href="{{ url_for('register') }}"
                                class="text-primary fw-bold text-decoration-none">Create Account</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .letter-spacing-1 {
        letter-spacing: 0.1em;
    }

    .x-small {
        font-size: 0.75rem;
    }

    .bg-light {
        background-color: #f8fafc !important;
    }
</style>
{% endblock %}
